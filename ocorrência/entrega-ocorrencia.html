<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrega - Ocorrências</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif; }
    body { background: #f0f0f0; display: flex; justify-content: center; }
    .screen { background: #f0f0f0; width: 390px; min-height: 100vh; }
    .statusbar { background: #fff; height: 36px; }
    .topbar { background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 10px 16px 12px; border-bottom: 0.5px solid #e5e5e5; }
    .topbar .left { display: flex; align-items: center; gap: 10px; }
    .hamburger { display: flex; flex-direction: column; gap: 4px; cursor: pointer; }
    .hamburger span { display: block; width: 20px; height: 2px; background: #333; border-radius: 2px; }
    .brand-pill { display: flex; align-items: center; gap: 7px; background: #f2f2f2; border-radius: 20px; padding: 6px 14px; }
    .brand-pill span { font-size: 15px; font-weight: 500; color: #222; }
    .topbar .right { display: flex; align-items: center; gap: 14px; }
    .tabs { background: #fff; display: flex; border-bottom: 1.5px solid #e5e5e5; }
    .tab { flex: 1; text-align: center; padding: 12px 0 10px; font-size: 14px; color: #888; cursor: pointer; position: relative; }
    .tab.active { color: #222; font-weight: 500; }
    .tab.active::after { content: ''; position: absolute; bottom: -1.5px; left: 10%; width: 80%; height: 2.5px; background: #e85d2a; border-radius: 2px; }
    .content { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .card { background: #fff; border-radius: 10px; padding: 14px 16px; }
    .card-id { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #555; font-weight: 500; margin-bottom: 12px; }
    .addr-row { display: flex; align-items: flex-start; gap: 7px; margin-bottom: 6px; }
    .addr-text { font-size: 15px; color: #222; line-height: 1.4; }
    .person { font-size: 14px; color: #777; margin-bottom: 10px; }
    .status-row { display: flex; align-items: center; gap: 7px; }
    .status-dot { width: 18px; height: 18px; border-radius: 50%; background: #f5a623; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .status-dot::after { content: ''; width: 8px; height: 2px; background: #fff; border-radius: 1px; }
    .status-text { font-size: 13px; color: #f5a623; font-weight: 500; }
    .status-date { font-size: 13px; color: #f5a623; }
  </style>
</head>
<body>
  <div class="screen">
    <div class="statusbar"></div>

    <div class="topbar">
      <div class="left">
        <div class="hamburger"><span></span><span></span><span></span></div>
        <div class="brand-pill">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/><path d="M16 15l-2-2 2-2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Entrega</span>
        </div>
      </div>
      <div class="right">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
      </div>
    </div>

    <div class="tabs">
      <div class="tab" id="tab-pendente">Pendente (<span id="count-pendente">0</span>)</div>
      <div class="tab active" id="tab-ocorrencia">Ocorrência (<span id="count-ocorrencia">0</span>)</div>
      <div class="tab" id="tab-encerrado">Encerrado</div>
    </div>

    <div class="content" id="cards-container"></div>
  </div>

  <script>
    // ==========================================
    // DADOS — altere aqui conforme necessário
    // ==========================================
    const config = {
      usarNovoMetodo: true
    };

    const dados = {
      pendente: 0,
      ocorrencias: [
        {
          codigo: "BR26308889 4891K",
          endereco: "Rua Mário Neves, 1, EcoPonte / Sampaio - Trafego",
          pessoa: "Gabriel Sampaio_",
          status: "Comércio Fechado",
          data: "18-04-2026 11:13"
        },
        {
          codigo: "BR26861768 7071X",
          endereco: "Travessa George Alan, 3, Bar do Brito no campo",
          pessoa: "Yasmim Gonçalves Da Silva_",
          status: "Comércio Fechado",
          data: "18-04-2026 11:13"
        }
      ]
    };
    // ==========================================

    const iconeCopiar = `
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8" stroke-linecap="round">
        <rect x="9" y="9" width="13" height="13" rx="2"/>
        <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
      </svg>`;

    const iconePin = `
      <svg width="15" height="15" viewBox="0 0 24 24" fill="#777" style="flex-shrink:0;margin-top:2px">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
      </svg>`;

    function renderCardsOriginal(ocorrencias) {
      const container = document.getElementById('cards-container');
      container.innerHTML = ocorrencias.map(item => `
        <div class="card">
          <div class="card-id">${item.codigo} ${iconeCopiar}</div>
          <div class="addr-row">${iconePin}<span class="addr-text">${item.endereco}</span></div>
          <div class="person">${item.pessoa}</div>
          <div class="status-row">
            <div class="status-dot"></div>
            <span class="status-text">${item.status}</span>
            <span class="status-date">${item.data}</span>
          </div>
        </div>
      `).join('');
    }

    function renderCardsNovoMetodo(ocorrencias) {
      const container = document.getElementById('cards-container');

      container.innerHTML = ocorrencias.map((item, index) => `
        <div class="card" data-metodo="novo" data-index="${index}">
          <div class="card-id">${item.codigo} ${iconeCopiar}</div>
          <div class="addr-row">${iconePin}<span class="addr-text">${item.endereco}</span></div>
          <div class="person">${item.pessoa}</div>
          <div class="status-row">
            <div class="status-dot"></div>
            <span class="status-text">${item.status}</span>
            <span class="status-date">${item.data}</span>
          </div>
        </div>
      `).join('');
    }

    document.getElementById('count-pendente').textContent = dados.pendente;
    document.getElementById('count-ocorrencia').textContent = dados.ocorrencias.length;
    if (config.usarNovoMetodo) {
      renderCardsNovoMetodo(dados.ocorrencias);
    } else {
      renderCardsOriginal(dados.ocorrencias);
    }
  </script>
</body>
</html>
